d1_planner_bridge_node:
  ros__parameters:
    pos_cmd_topic: "/drone_0_planning/pos_cmd"
    odom_topic: "/odom"
    cmd_vel_topic: "/command/cmd_twist"

    control_rate_hz: 100.0

    # Clamp only; no goal stop / no position pursuit
    max_vx: 3.0
    max_wz: 1.5

    # wz = yaw_kp * (cmd.yaw - robot_yaw) + yaw_rate_ff * cmd.yaw_dot
    yaw_kp: 1.5
    yaw_rate_ff: 1.0

    # World (vx,vy) -> body linear.x; needs /odom yaw
    project_velocity_to_body: true
