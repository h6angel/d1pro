d1_planner_bridge_node:
  ros__parameters:
    # D1 chassis limits — also set D1_MAX_VX / D1_MAX_WZ in start_ego_stack.sh
    pos_cmd_topic: "/drone_0_planning/pos_cmd"
    odom_topic: "/ov_msckf/odomimu"
    cmd_vel_topic: "/command/cmd_twist"

    control_rate_hz: 100.0

    log_cmd_vel: true
    log_cmd_vel_period_ms: 500

    max_vx: 0.6
    max_wz: 0.5

    # Path-tangent yaw: align_heading ~34deg; faster kp for D1 trial tuning
    yaw_kp: 1.2
    yaw_rate_ff: 1.0
    max_yaw_dot_ff: 0.5
    max_wz_yaw_p: 0.5
    min_turn_wz: 0.5

    align_heading_thresh_rad: 0.6
    allow_reverse: false

    min_vx: 0.08
    vx_deadband: 0.01

    enable_lateral_correction: true
    lateral_kp: 0.3
    lateral_error_deadband: 0.05
    max_wz_lateral_p: 0.35
    vx_lat_damp_gain: 0.25
    lateral_slowdown_dist: 0.4
    min_plan_speed_for_lateral: 0.15
    max_lateral_error_m: 2.0

    cmd_vel_ema_alpha: 0.8

    project_velocity_to_body: true
